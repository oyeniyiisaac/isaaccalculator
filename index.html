<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 grid grid-cols-4 gap-3 w-full max-w-sm mx-auto p-4 content-center">
    <button class="h-14 text-xl font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 active:scale-95 transition" onclick="calc(9)">9</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 active:scale-95 transition" onclick="calc(8)">8</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 active:scale-95 transition" onclick="calc(7)">7</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 active:scale-95 transition" onclick="calc(6)">6</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 active:scale-95 transition" onclick="calc(5)">5</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 active:scale-95 transition" onclick="calc(4)">4</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 active:scale-95 transition" onclick="calc(3)">3</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 active:scale-95 transition" onclick="calc(2)">2</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 active:scale-95 transition" onclick="calc(1)">1</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 active:scale-95 transition" onclick="calc(0)">0</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-cyan-200 bg-cyan-50 text-cyan-800 hover:bg-cyan-100 active:scale-95 transition" onclick="operator('+')">+</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-cyan-200 bg-cyan-50 text-cyan-800 hover:bg-cyan-100 active:scale-95 transition" onclick="operator('-')">-</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-cyan-200 bg-cyan-50 text-cyan-800 hover:bg-cyan-100 active:scale-95 transition" onclick="operator('*')">*</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-cyan-200 bg-cyan-50 text-cyan-800 hover:bg-cyan-100 active:scale-95 transition" onclick="operator('/')">/</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-cyan-700 bg-cyan-700 text-white hover:bg-cyan-800 active:scale-95 transition" onclick="operator('equalTo')">=</button>
    <button class="h-14 text-xl font-semibold rounded-xl border border-rose-200 bg-rose-50 text-rose-700 hover:bg-rose-100 active:scale-95 transition" onclick="calc('clear')">AC</button>
    <div id="show" class="order-first col-span-4 h-16 rounded-xl border border-slate-200 bg-white px-4 flex items-center justify-end text-2xl font-medium text-slate-900 overflow-x-auto shadow-sm"></div>
</body>
<script src="/script.js"></script>
</html>
